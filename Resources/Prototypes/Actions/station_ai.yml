# Actions
- type: entity
  id: ActionJumpToCore
  name: Jump to core
  description: Sends your eye back to the core.
  components:
  - type: InstantAction
    priority: -10
    itemIconStyle: BigAction
    icon:
      sprite: Interface/Actions/actions_ai.rsi
      state: ai_core
    event: !type:JumpToCoreEvent

- type: entity
  id: ActionShowJobIcons
  name: Show job icons
  description: Shows job icons for crew members.
  components:
  - type: InstantAction
    priority: -5
    itemIconStyle: BigAction
    icon:
      sprite: Interface/Actions/actions_ai.rsi
      state: job_view
    event: !type:ActionComponentChangeEvent
      components:
      - type: ShowJobIcons

- type: entity
  id: ActionSurvCameraLights
  name: Toggle camera lights
  description: Enable surveillance camera lights near wherever you're viewing.
  components:
  - type: InstantAction
    priority: -6
    itemIconStyle: BigAction
    icon:
      sprite: Interface/Actions/actions_ai.rsi
      state: camera_light
    event: !type:RelayedActionComponentChangeEvent
      components:
      - type: LightOnCollideCollider
      - type: FixturesChange
        fixtures:
          lightTrigger:
            shape:
              !type:PhysShapeCircle
              radius: 0.35
            density: 80
            hard: false
            layer:
            - GhostImpassable


- type: entity
  id: ActionAIViewLaws
  name: View Laws
  description: View the laws that you must follow.
  components:
  - type: InstantAction
    priority: -3
    itemIconStyle: NoItem
    icon:
      sprite: Interface/Actions/actions_ai.rsi
      state: state_laws
    event: !type:ToggleLawsScreenEvent
    useDelay: 0.5

# [Changed by MisfitsCrew/Operator] Adds Station AI command actions for selecting and ordering ZAX NPC units through camera view.
- type: entity
  id: ActionStationAiSelectNpc
  name: Select NPC
  description: Selects or deselects an NPC for Station AI command orders.
  components:
  - type: EntityTargetAction
    priority: -20
    itemIconStyle: BigAction
    icon: Interface/VerbIcons/sentient.svg.192dpi.png
    checkCanInteract: false
    checkConsciousness: false
    checkCanAccess: false
    range: 0
    repeat: true
    deselectOnMiss: false
    event: !type:StationAiSelectNpcActionEvent

- type: entity
  id: ActionStationAiClearNpcSelection
  name: Clear NPC selection
  description: Clears selected NPCs and restores their normal AI.
  components:
  - type: InstantAction
    priority: -21
    itemIconStyle: BigAction
    icon: Interface/VerbIcons/close.svg.192dpi.png
    checkConsciousness: false
    event: !type:StationAiClearNpcSelectionActionEvent

- type: entity
  id: ActionStationAiMoveNpcs
