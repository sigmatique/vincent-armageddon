#small flags

- type: constructionGraph
  id: MisfitsFlagUS
  start: start
  graph:
    - node: start
      edges:
        - to: flagus
          steps:
            - material: Cloth
              amount: 2
              doAfter: 3

    - node: flagus
      entity: N14FlagWallUS
      edges:
        - to: start
          steps:
            - tool: Cutting
              doAfter: 3
          completed:
            - !type:SpawnPrototype
              prototype: MaterialCloth1
              amount: 2
            - !type:DeleteEntity

