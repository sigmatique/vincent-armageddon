# Banners aka big flags

- type: constructionGraph
  id: MisfitsFlagCoA
  start: start
  graph:
    - node: start
      edges:
        - to: flagcoa
          steps:
            - material: WoodPlank
              amount: 5
              doAfter: 3
            - material: Cloth
              amount: 5
              doAfter: 3
          completed:
            - !type:SnapToGrid
              southRotation: true

    - node: flagcoa
      entity: MisfitsDecorationFlagChildrenOfAtom
      edges:
        - to: start
          steps:
            - tool: Prying
              doAfter: 3
          completed:
            - !type:SpawnPrototype
              prototype: MaterialWoodPlank1
              amount: 5
            - !type:SpawnPrototype
              prototype: MaterialCloth1
              amount: 5
            - !type:DeleteEntity 

