              # Signs (like left and right wooden signs)

- type: constructionGraph
  id: WoodenSign
  start: start
  graph:
    - node: start
      edges:
        - to: sign_left
          steps:
            - material: WoodPlank
              amount: 2
              doAfter: 2
        - to: sign_right
          steps:
            - material: WoodPlank
              amount: 2
              doAfter: 2
    - node: sign_left
      entity: WoodenSign
      edges:
        - to: start
          steps:
            - tool: Screwing
              doAfter: 3
          completed:
            - !type:SpawnPrototype
              prototype: MaterialWoodPlank1
              amount: 2
            - !type:DeleteEntity 
    - node: sign_right
      entity: WoodenSignRight
      edges:
        - to: start
          steps:
            - tool: Screwing
              doAfter: 3
          completed:
            - !type:SpawnPrototype
              prototype: MaterialWoodPlank1
              amount: 2
