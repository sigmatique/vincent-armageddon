- type: entity
  abstract: true
  parent: BaseStructure
  id: MisfitsZaxMonitorBase
  name: Z.A.X monitor
  description: A decorative Z.A.X-linked monitor. Its camera feed is wired into the Z.A.X. core.
  placement:
    mode: SnapgridCenter
    snap:
    - Wallmount
  components:
  - type: StationAiVision
  - type: StationAiWhitelist
  - type: WallMount
    arc: 360
  - type: InteractionOutline
  - type: Sprite
    drawdepth: WallMountedItems
    sprite: _Misfits/Structures/Decoration/zax_monitors.rsi
  - type: PointLight
    radius: 1.2
    energy: 0.55
    color: "#4FB9F5"
    castShadows: false
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.20,-0.10,0.25,0.35"
        density: 60
        mask:
        - FullTileMask
        layer:
        - WallLayer
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Metallic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 50
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]

- type: entity
  parent: MisfitsZaxMonitorBase
  id: MisfitsZaxMonitorStaticLeft
  suffix: Static, Left
  components:
  - type: Sprite
    layers:
    - state: static_left

