# Cinder Cohort set.
- type: entity
  parent: N14FalloutArmorBase
  id: MisfitsCenturionCinderCohort
  name: Cinder Cohort Armor
  description: "Armor forged in the ashes of fallen legionnaires."
  components:
  - type: Sprite
    sprite: _Misfits/Clothing/CaesarLegion/Centurion/Cinder_Cohort.rsi
  - type: Clothing
    sprite: _Misfits/Clothing/CaesarLegion/Centurion/Cinder_Cohort.rsi
  - type: ClothingSpeedModifier
    walkModifier: 1
    sprintModifier: 1
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.45
        Slash: 0.45
        Piercing: 0.45
        Heat: 0.45
  - type: ExplosionResistance
    damageCoefficient: 0.40
  - type: StaminaDamageResistance
    coefficient: 0.85 # 15%
#  - type: ClothingSpecialModifier
#    strengthModifier: 2"

- type: entity
  parent: ClothingHeadBase
  id: MisfitsCenturionCinderCohortHelmet
  name: Cinder Cohort Helmet
  description: "A helmet forged in the ashes of fallen legionnaires."
  components:
  - type: Sprite
    sprite: _Misfits/Clothing/CaesarLegion/Centurion/Cinder_CohortHelm.rsi
  - type: Clothing
    sprite: _Misfits/Clothing/CaesarLegion/Centurion/Cinder_CohortHelm.rsi
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.8
        Slash: 0.8
        Piercing: 0.8
        Heat: 0.8
  - type: ExplosionResistance
    damageCoefficient: 0.90
  - type: HideLayerClothing
    force: true
    slots:
    - Hair
    - FacialHair

