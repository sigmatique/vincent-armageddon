-# #Misfits Add - Princeps set sprites credited to nope_no / bill clinton.
- type: entity
  parent: N14FalloutArmorBase
  id: MisfitsLegionPrincepsArmor
  name: Principes Pattern Armor
  description: Captured heavy plate reworked into veteran Princeps armor. It trades speed for brutal staying power and keeps incoming small and medium rounds glancing away like T-60 plate.
  components:
  - type: Damageable
  - type: PowerArmorIntegrity
    maxIntegrity: 375
    brokenBleedthroughRatio: 1.0
  - type: Repairable
    fuelCost: 8
    doAfterDelay: 14
    qualityNeeded: Welding
  - type: Sprite
    sprite: _Misfits/Clothing/CaesarLegion/Princeps/princeps_armor.rsi
  - type: Clothing
    sprite: _Misfits/Clothing/CaesarLegion/Princeps/princeps_armor.rsi
  - type: ClothingSpeedModifier
    walkModifier: 0.75
    sprintModifier: 0.75
  - type: Armor
    modifiers:
      coefficients:
        Slash: 0.65
        Blunt: 0.70
        Piercing: 0.60
        Heat: 0.65
        Caustic: 0.90
  - type: StaminaDamageResistance
    coefficient: 0.50
  - type: Reflect
    reflects:
      - SmallCaliber
      - MediumCaliber
    reflectProb: 0.4
    reflectProbByType:
      MediumCaliber: 0.15
    innate: true
    spread: 90

- type: entity
  parent: N14ClothingHeadHatCenturionHelmet
  id: MisfitsLegionPrincepsHelmet
  name: Princeps Helmet
  description: A crested Legion helmet issued with the Princeps set.
  components:
  - type: Sprite
    sprite: _Misfits/Clothing/CaesarLegion/Princeps/princeps_helmet.rsi
  - type: Clothing
    sprite: _Misfits/Clothing/CaesarLegion/Princeps/princeps_helmet.rsi

- type: entity
  parent: N14ClothingHandsGlovesCenturion
  id: MisfitsLegionPrincepsGloves
  name: Princeps gauntlets
  description: Heavy bracers worn with the Princeps pattern armor.
  components:
  - type: Sprite
    sprite: _Misfits/Clothing/CaesarLegion/Princeps/princeps_gloves.rsi
  - type: Clothing
    sprite: _Misfits/Clothing/CaesarLegion/Princeps/princeps_gloves.rsi

- type: entity
  parent: N14ClothingBootsCenturion
  id: MisfitsLegionPrincepsBoots
  name: Princeps boots
  description: Hobnailed Legion boots paired with the Princeps set.
  components:
  - type: Sprite
    sprite: _Misfits/Clothing/CaesarLegion/Princeps/princeps_boots.rsi
  - type: Clothing
    sprite: _Misfits/Clothing/CaesarLegion/Princeps/princeps_boots.rsi
