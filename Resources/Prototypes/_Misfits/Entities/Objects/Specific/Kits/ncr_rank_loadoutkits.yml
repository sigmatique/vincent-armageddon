- type: entity
  name: private first class fireteam kit
  parent: KitBase
  id: KitNCR_PFCFireteam
  description: A crate containing trusted fireteam gear for a dependable NCR private first class.
  components:
  - type: Sprite
    state: pointman
  - type: Item
    size: Huge
  - type: SpawnItemsOnUse
    items:
      - id: ClothingBeltNCRPouches
      - id: N14WeaponRifle556ServiceScoped
      - id: Magazine556Rifle
        amount: 4
      - id: N14WeaponPistol9mm
      - id: N14MagazinePistol9mm
        amount: 2
      - id: RadioHandheld
      - id: SmokeGrenade
      - id: N14BoxCardboardMREBoxCFilled
      - id: N14Stimpak
      - id: N14RadXPill
      - id: N14CleanGauze10
      - id: N14Flare
