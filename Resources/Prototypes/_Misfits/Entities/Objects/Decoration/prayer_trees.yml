- type: entity
  parent: BaseTree
  id: BasePrayerTree
  abstract: true
  components:
    - type: Prayable
    - type: Destructible
      thresholds:
        - trigger:
            !type:DamageTrigger
            damage: 2000
          behaviors:
            - !type:PlaySoundBehavior
              sound:
                path: /Audio/Effects/tree_fell.ogg
                params:
                  volume: 5
                  variation: 0.05
            - !type:DoActsBehavior
              acts: [ "Destruction" ]
            - !type:SpawnEntitiesBehavior
              spawn:
                N14FloraLogTimber:
                  min: 2
                  max: 8
                HeadSkeleton:
                  min: 1
                  max: 1
                MaterialBones1:
                  min: 3
                  max: 10

- type: entity
  parent: BasePrayerTree
  id: TreeOfMars
  name: Tree of Mars
  description: The leaves whisper of past deeds and glories.
  components:
  - type: Sprite
    sprite: _Misfits/Structures/Decoration/Flora/mutant_trees.rsi
    state: tree-of-mars
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.9,-0.8,0.9,0.4"
        density: 1000
        layer:
          - WallLayer

- type: entity
  parent: BasePrayerTree
  id: TribalTree
  name: Tree of Life
  description: The glowing strands sway gently in the still air.
  components:
    - type: Sprite
      sprite: _Misfits/Structures/Decoration/Flora/mutant_trees.rsi
      state: tribal-tree
    - type: Fixtures
      fixtures:
        fix1:
          shape:
            !type:PhysShapeAabb
            bounds: "-0.5,-0.65,0.5,0.2"
          density: 1000
          layer:
            - WallLayer
    - type: PointLight
      color: "#c0faef"
      radius: 5
      power: 4