    - min: 72000   # 20 hours
      entity: ClothingNeckPinNCRSpecialist
    - min: 144000  # 40 hours
      entity: ClothingNeckPinNCRSergeant

# Specialists: PV2 (E-2) → PFC (E-3) at 20h NCR dept → SPC (E-4) at 40h NCR dept
