# Super Mutant body parts.
# Update sprite paths once .dmi sprites are converted to .rsi.

- type: entity
  id: MisfitsPartSuperMutant
  parent: [BaseItem, BasePart]
  name: "super mutant body part"
  abstract: true
  components:
  - type: Damageable
    damageContainer: OrganicPart
    damageModifierSet: SuperMutant
  - type: BodyPart
    # Integrity thresholds scaled ×2.22 vs default human (90→200 CriticallyWounded).
    # At default 90, legs disable at ~306 raw Slash while mob crits at ~571 raw.
    # At 200, legs disable at ~680 raw, safely after mob crit at ~571 raw.
    severIntegrity: 300  # Updated at human part integrity has been increased
    integrityThresholds:
      CriticallyWounded: 200
      HeavilyWounded: 165
      ModeratelyWounded: 130
      SomewhatWounded: 90
      LightlyWounded: 45
      Healthy: 22
  - type: ContainerContainer
    containers:
      bodypart: !type:Container
        ents: []
  - type: StaticPrice
    price: 0
  - type: Extractable
    juiceSolution:
      reagents:
      - ReagentId: Fat
        Quantity: 5
      - ReagentId: Blood
        Quantity: 15
  # Limb gib thresholds tuned to account for double damage reduction:
  # Both the body part and mob entity apply the SuperMutant 50% modifier,
  # so the mob needs ~800 raw damage to crit. All limb types set to 400
  # effective (800 raw) so limbs and body reach breaking point concurrently.
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTypeTrigger
        damageType: Blunt
        damage: 400
      behaviors:
      - !type:GibPartBehavior { }
    - trigger:
        !type:DamageTypeTrigger
        damageType: Slash
        damage: 400
      behaviors:
      - !type:GibPartBehavior { }
    - trigger:
        !type:DamageTypeTrigger
        damageType: Piercing
        damage: 500
      behaviors:
      - !type:GibPartBehavior { }
    - trigger:
        !type:DamageTypeTrigger
        damageType: Heat
        damage: 400
      behaviors:
      - !type:SpawnEntitiesBehavior
        spawnInContainer: true
        spawn:
          Ash:
            min: 1
            max: 1
      - !type:BurnBodyBehavior { }
      - !type:PlaySoundBehavior
        sound:
          collection: MeatLaserImpact

- type: entity
  id: MisfitsTorsoSuperMutant
  name: "super mutant torso"
  parent: [MisfitsPartSuperMutant, BaseTorso]
  components:
  - type: Sprite
    sprite: _Misfits/Mobs/Species/SuperMutant/parts.rsi
    state: "torso_m"
  - type: Extractable
    juiceSolution:
      reagents:
      - ReagentId: Fat
        Quantity: 15
      - ReagentId: Blood
        Quantity: 30
  - type: StaticPrice
    price: 15
  - type: Item
    size: Large
  # Doubled torso gib thresholds vs base human (400->800)
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTypeTrigger
        damageType: Blunt
        damage: 800
      behaviors:
      - !type:GibPartBehavior { }
    - trigger:
        !type:DamageTypeTrigger
        damageType: Slash
        damage: 800
      behaviors:
      - !type:GibPartBehavior { }
    - trigger:
        !type:DamageTypeTrigger
        damageType: Piercing
        damage: 1000
      behaviors:
      - !type:GibPartBehavior { }
    - trigger:
        !type:DamageTypeTrigger
        damageType: Heat
        damage: 800
      behaviors:
      - !type:SpawnEntitiesBehavior
        spawnInContainer: true
        spawn:
          Ash:
            min: 1
            max: 1
      - !type:BurnBodyBehavior { }
      - !type:PlaySoundBehavior
        sound:
          collection: MeatLaserImpact

- type: entity
  id: MisfitsHeadSuperMutant
  name: "super mutant head"
  parent: [MisfitsPartSuperMutant, BaseHead]
  components:
  - type: Sprite
    sprite: _Misfits/Mobs/Species/SuperMutant/parts.rsi
    state: "head_m"
  - type: Icon
    sprite: _Misfits/Mobs/Species/SuperMutant/parts.rsi
    state: "head_m"
  - type: BodyPart
    partType: Head
    vital: true
  - type: Input
    context: "ghost"
  - type: MovementSpeedModifier
    baseWalkSpeed: 0
    baseSprintSpeed: 0
  - type: InputMover
  - type: GhostOnMove
  - type: Tag
    tags:
      - Head
  - type: Extractable
    juiceSolution:
      reagents:
      - ReagentId: Fat
        Quantity: 8
      - ReagentId: Blood
        Quantity: 15
  - type: StaticPrice
    price: 15
  - type: Item
    size: Normal

