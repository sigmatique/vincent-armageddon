# #Misfits Add - Full Eighties faction department with 5 ranked job prototypes.
# Named after Interstate 80. Replaces the single "Eighties" placeholder from Raider/eighties.yml.
# Ranks top-to-bottom: The Block (1) → Cylinders (2) → Pistons (3) → Oilers (4) → Road Rash (4).
# Slot counts are enforced by spawner placement on the map, not by this file.

# ──────────────────────────────────────────────
# THE BLOCK — leader (1 slot)
# ──────────────────────────────────────────────
- type: job
  id: EightiesTheBlock
  setPreference: true
  weight: 60
  name: job-name-eighties-the-block
  description: job-description-eighties-the-block
  playTimeTracker: EightiesTheBlock
  whitelisted: false
  access:
  - 80sHead
  - 80s
  - 80sSlave
  requirements:
  - !type:MinPlayersRequirement
    min: 0
  - !type:CharacterSpeciesRequirement
    species:
    - Human
    - Ghoul
    - GhoulGlowing
  - !type:CharacterDepartmentTimeRequirement
    department: Eighties
    min: 162000 # 45 hours
  startingGear: EightiesTheBlockGear
  alwaysUseSpawner: true
  icon: "JobIconEighties"
  supervisors: job-supervisors-eighties-the-block
  canBeAntag: false
  special:
  - !type:AddComponentSpecial
    components:
      - type: NpcFactionMember
        factions:
          - PlayerRaider
          - Wastelander
  - !type:AddTraitSpecial
    traits: [ N14RidingPerk ]

- type: startingGear
  id: EightiesTheBlockGear
  equipment:
    bandage: NCClothingBandageRaiders
    id: MisfitsEightiesIDCardHead
    gloves: N14ClothingHandsGlovesBlackBiker
    jumpsuit: MisfitsClothingTheBlockPants
    outerClothing: MisfitsClothingOuterTheBlockArmor
    mask: MisfitsClothingTheBlockMask
    shoes: ClothingShoesBootsJack
    neck: ClothingNeckBlackScarf
    head: N14ClothingHeadHatBeanie
    ears: MisfitsClothingHeadsetEighties
    back: N14ClothingBackpackMilitary
    pocket1: EightiesTheBlockloadoutkits
    belt: ClothingBeltMilitary
  storage:
    back:
    - N14BoxPlasticFilledWastelander

- type: playTimeTracker
  id: EightiesTheBlock

