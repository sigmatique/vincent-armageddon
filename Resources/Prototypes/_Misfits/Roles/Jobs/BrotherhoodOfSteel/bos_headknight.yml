#Misfits Change /Add/: New consolidated Brotherhood Head Knight job.
- type: job
  id: BoSHeadKnight
  setPreference: true
  hideWithoutJobWhitelist: false # #Misfits Tweak - BoS Heads not whitelisted
  hideIfPlaytimeRequirementsNotMet: false # #Misfits Tweak - all jobs visible in selection
  jobWhitelistBypassesRoleTimers: true
  weight: 100
  #showBorder: true #Misfits Tweak: Removed border so head ranks group together visually
  overrideConsoleVisibility: false
  canBeAntag: false
  name: job-name-bos-headknight
  description: job-description-bos-headknight
  playTimeTracker: BoSHeadKnight
  requirements:
    - !type:CharacterSpeciesRequirement
      species:
      - Human
    - !type:CharacterDepartmentTimeRequirement # #Misfits Tweak - T7 faction timelock (40h BoS)
      department: BrotherhoodOfSteel
      min: 144000 # 40 hours
    - !type:CharacterPlaytimeRequirement # #Misfits Tweak - Require 8h as Senior Knight before Head Knight
      tracker: BoSMidKnight
      min: 28800 # 8 hours as Senior Knight
  startingGear: BoSHeadKnightGear
  alwaysUseSpawner: true
  icon: "JobIconBosMKnight"
  supervisors: job-supervisors-bos-headknight
  requireAdminNotify: true
  accessGroups:
  - BOSHeadKnight
  special:
  - !type:AddComponentSpecial
    components:
      - type: NpcFactionMember
        factions:
          - BrotherhoodOfSteel
      - type: LanguageKnowledge # #Misfits Add: Heads understand Brotherhood binary code by default.
        speaks:
        - English
        understands:
        - English
        - N14BrotherBeep

- type: startingGear
  id: BoSHeadKnightGear
  equipment:
    jumpsuit: N14ClothingUniformJumpskirtBOSBlack
    back: N14ClothingBackpackMilitary
    shoes: N14ClothingBootsLeatherFilled
    head: N14ClothingHeadKnightBeret
    outerClothing: MisfitsBoSHeadKnightArmor # #Misfits Tweak: T6 armor (0.65/0.60) — Head Knight tier, equal to NCR Staff Sergeant / Legion Prime Decanus
    hands: N14ClothingHandsGlovesCombat
    pocket1: BoSBrotherhoodHeadKnightKits
    id: N14HeadKnight_PipBoy
    ears: N14ClothingHeadsetBrotherhoodOfSteel
    belt: ClothingBeltBoSWebbing
  storage:
    back:
    - N14ClothingHeadHatBrotherhoodHelmetPaladin
    - N14BoxPlasticFilledMilitary

- type: playTimeTracker
  id: BoSHeadKnight
