- type: job
  id: BoSMidSquire # It was renamed to Initiate, but don't change the ID!
  setPreference: true
  hideIfPlaytimeRequirementsNotMet: false # #Misfits Tweak - all jobs visible in selection
  jobWhitelistBypassesRoleTimers: true # #Misfits Change
  weight: 20
  showBorder: true
  overrideConsoleVisibility: true
  canBeAntag: false
  name: job-name-bos-mid-squire
  description: job-description-bos-mid-squire
  playTimeTracker: BoSMidSquire
  requirements:
    - !type:CharacterSpeciesRequirement # BoS does not accept Ghouls or Glowing Ghouls
      species:
        - Human
    - !type:CharacterDepartmentTimeRequirement # #Misfits Tweak - T2 faction timelock (4h BoS)
      department: BrotherhoodOfSteel
      min: 14400 # 4 hours
    #- !type:CharacterPlaytimeRequirement # TEMP REMOVED
    #  tracker: BoSInitiate
    #  min: 18000 # 5 hours
  startingGear: BoSMidSquireGear
  alwaysUseSpawner: true
  icon: "JobIconBosMSquire" # Forge-Change
  supervisors: job-supervisors-bos-mid-initiate
  accessGroups:
  - BOSSquire
  special:
  - !type:AddComponentSpecial
    components:
      - type: NpcFactionMember
        factions:
          - BrotherhoodOfSteel

- type: startingGear
  id: BoSMidSquireGear
  equipment:
    jumpsuit: N14ClothingUniformJumpskirtBOSBlack  #Misfits Change /Tweak/: New consolidated BoS gear
    back: MisfitsClothingBackpackSquire # #Misfits Add - Squire Bag starting back item
    shoes: N14ClothingBootsLeatherFilled
    head: N14ClothingHeadHatBanganeBoS
    outerClothing: MisfitsBoSSquireArmor # #Misfits Tweak: T2 armor (0.85/0.80) — Squires are still in training, lighter protection than Knights
    pocket1: BoSBrotherhoodSquireKits
    id: N14IDBrotherhoodOfSteelHolotagSquire
    ears: N14ClothingHeadsetBrotherhoodOfSteel
    belt: MisfitsClothingBeltSquireWebbingBlack # #Misfits Add - black Squire Webbing default belt
  storage:
    back:
    - N14BoxPlasticFilledMilitary

- type: playTimeTracker
  id: BoSMidSquire
