# #Misfits Add - Lobby loadouts for SuperMutantWearable-tagged clothing.
# These entries allow mutant players to pick species-fitted gear in the lobby.

- type: loadout
  id: MisfitsLoadoutSuperMutantGladiatorLoincloth
  category: Uniform
  cost: 1
  exclusive: true
  requirements:
    - !type:CharacterJobRequirement
      jobs:
        - SuperMutant
        - Nightkin
        - SuperMutantGladiator
        - SuperMutantRanger
        - SuperMutantTrooper
        - SuperMutantNCRRanger
        - SuperMutantNCRTrooper
        - SuperMutantTribal
  items:
    - ClothingSuperMutantGladiatorLoincloth

