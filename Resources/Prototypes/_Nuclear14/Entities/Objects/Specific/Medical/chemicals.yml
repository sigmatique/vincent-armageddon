#MARK: Healing Powder
- type: entity
  name: healing powder
  parent: BaseItem
  id: N14HealingPowder
  description: A bag of tribal healing powder. Nauseating.
  components:
  - type: Tag
    tags:
    - N14TribalMedicine # #Misfits Fix: tag allows storage in the Medical Belt
  - type: Sprite
    sprite: _Nuclear14/Objects/Specific/Medical/drugs.rsi
    state: healingpowder
  - type: Item
    sprite: _Nuclear14/Objects/Specific/Medical/drugs.rsi
    size: Small
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 20
        reagents:
        - ReagentId: HealingPowder
          Quantity: 20
  - type: Food
    forceFeedDelay: 1
    transferAmount: null
    eatMessage: food-swallow
    useSound: /Audio/Items/pill.ogg
  - type: FlavorProfile
    ignoreReagents: []
  - type: SolutionSpiker
    sourceSolution: food
  - type: Extractable
    grindableSolutionName: food
  - type: Damageable
    damageContainer: Inorganic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 75
      behaviors:
      - !type:SpillBehavior
        solution: food
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: Construction
    graph: N14HealingPowder
    node: healingpowder

