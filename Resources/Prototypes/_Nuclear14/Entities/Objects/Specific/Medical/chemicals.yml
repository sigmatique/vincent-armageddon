  id: N14Stimpak
  name: stimpak
  description: A syringe filled with a wondrous mixture of medical reagents. Essential for those with little to no medical knowledge.
  components:
  - type: StaticPrice
    price: 15
  - type: Item
    sprite: _Nuclear14/Objects/Specific/Medical/ms13_stimpak.rsi
    heldPrefix: stimpak
  - type: Sprite
    scale: 0.75, 0.75
    sprite: _Nuclear14/Objects/Specific/Medical/ms13_stimpak.rsi
    layers:
    - state: stimpakfill1
      map: ["enum.SolutionContainerLayers.Fill"]
      visible: false
    - state: stimpak-empty
      map: [ "enum.SolutionContainerLayers.Base" ]
  - type: Icon
    sprite: _Nuclear14/Objects/Specific/Medical/ms13_stimpak.rsi
    state: "stimpak-empty"
  - type: SolutionContainerVisuals
    maxFillLevels: 1
    changeColor: true
    fillBaseName: stimpakfill
    emptySpriteName: stimpak-empty
  - type: Appearance
  - type: Hypospray
    solutionName: pen
    transferAmount: 25
  - type: SolutionContainerManager
    solutions:
      pen:
        maxVol: 25
        reagents:
        - ReagentId: HealingMixture
          Quantity: 25
  - type: Construction
    graph: N14Stimpak
    node: stimpak
  - type: Tag # #Misfits Add - Allow empty stimpaks to be reused in crafting recipes
    tags:
    - Syringe
    - N14EmptySyringe
  - type: UseDelay
    delay: 0.75

