- type: entity
  parent: BaseItem
  id: N14ChemicalSyringe
  name: chemical syringe
  description: A syringe filled with an unknown chemical. Chem junkies would kill you for it.
  components:
  - type: Item
    sprite: _Nuclear14/Objects/Specific/Medical/ms13_stimpak.rsi
    heldPrefix: stimpak
  - type: Sprite
    scale: 0.75, 0.75
    sprite: _Nuclear14/Objects/Specific/Medical/ms13_stimpak.rsi
    layers:
    - state: stimpakfill1
      map: ["enum.SolutionContainerLayers.Fill"]
      visible: false
    - state: stimpak-empty
      map: [ "enum.SolutionContainerLayers.Base" ]
  - type: Icon
    sprite: _Nuclear14/Objects/Specific/Medical/ms13_stimpak.rsi
    state: "stimpak-empty"
  - type: SolutionContainerVisuals
    maxFillLevels: 1
    changeColor: true
    fillBaseName: stimpakfill
    emptySpriteName: stimpak-empty
  - type: SolutionContainerManager
    solutions:
      pen:
        maxVol: 15
  - type: ExaminableSolution
    solution: pen
  - type: Hypospray
    onlyAffectsMobs: false
    solutionName: pen
    transferAmount: 30
  - type: Appearance
  - type: WelderRefinable
    refineResult:
    - id: SheetPlastic1
  - type: Tag
    tags:
    - Syringe

- type: entity
  name: doctors syringe
  parent: BaseItem
  description: Used to draw blood samples from mobs, or to inject them with reagents. Chem junkies would kill you for it.
  id: N14BaseSyringe
  abstract: true
  components:
  - type: Item
    sprite: _Nuclear14/Objects/Specific/Medical/ms13_doctorssyringe.rsi
  - type: Sprite
    scale: 0.75, 0.75
    sprite: _Nuclear14/Objects/Specific/Medical/ms13_doctorssyringe.rsi
    layers:
    - state: doctorssyringefill1
      map: ["enum.SolutionContainerLayers.Fill"]
      visible: false
    - state: doctorssyringe-empty
      map: [ "enum.SolutionContainerLayers.Base" ]
  - type: Icon
    sprite: _Nuclear14/Objects/Specific/Medical/ms13_doctorssyringe.rsi
    state: "doctorssyringe-empty"
  - type: SolutionContainerVisuals
    maxFillLevels: 1
    changeColor: true
    fillBaseName: doctorssyringefill
    emptySpriteName: doctorssyringe-empty
  - type: Appearance
  - type: SolutionContainerManager
    solutions:
      injector:
        maxVol: 15
  - type: Injector
    transferAmount: 15
    toggleState: draw
    injectOnly: false
  - type: ExaminableSolution
    solution: injector
  - type: Spillable
    solution: injector
  - type: TrashOnSolutionEmpty
    solution: injector
  - type: WelderRefinable
    refineResult:
    - id: SheetPlastic1
  - type: Tag
    tags:
    - Syringe
  - type: DoAfter

