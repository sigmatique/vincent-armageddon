- type: entity
  parent: BaseVehicle
  id: N14VehicleBikeGreen
  name: green motorbike
  description: A clean green motorbike.
  components:
  - type: Vehicle
  - type: Sprite
    sprite: _Nuclear14/Objects/Vehicles/bikesbuggy.rsi
    layers:
    - state: bike_green
      map: ["enum.VehicleVisualLayers.AutoAnimate"]
    netsync: false
    noRot: true
  - type: MovementSpeedModifier
    acceleration: 6
    friction: 0.1
    baseWalkSpeed: 8
    baseSprintSpeed: 10
  - type: ItemSlots
    slots:
      key_slot:
        name: Keys
        whitelist:
          requireAll: true
          tags:
          - VehicleKey
          - MotorbikeKeys
        insertSound:
          path: /Audio/Effects/Vehicle/vehiclestartup.ogg
          params:
            volume: -3

- type: entity
  parent: N14VehicleBikeGreen
  id: N14VehicleBikeFlamey
  name: flamey motorbike
  description: A motorbike with a flame decal.
  components:
  - type: AmbientSound
    sound: "/Audio/_Nuclear14/Effects/motorcycle2.ogg"
    range: 10
    volume: -10
    enabled: false
  - type: Sprite
    layers:
    - state: bike_flamy2
      map: ["enum.VehicleVisualLayers.AutoAnimate"]
  - type: Vehicle
    renderOver: None
    overlayPrototype: VehicleBikeFlameyOverlay

- type: entity
  id: VehicleBikeFlameyOverlay
  name: flamey overlay
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _Nuclear14/Objects/Vehicles/bikesbuggy.rsi
    layers:
      - state: bike_flamy1_overlay
    noRot: true
    drawdepth: OverMobs # Set the drawdepth here to be above players non-clickable
  - type: Tag
    tags:
      - HideContextMenu
  - type: Appearance

- type: entity
  parent: N14VehicleBikeGreen
  id: N14VehicleBikeRustLight
  name: rusty motorbike
