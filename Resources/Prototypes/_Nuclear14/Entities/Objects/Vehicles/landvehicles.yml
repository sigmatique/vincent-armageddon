- type: entity
  parent: N14VehicleBikeGreen
  id: N14VehicleBikeClassic
  name: classic motorbike
  description: A reliable two-wheeler.
  components:
  - type: Sprite
    layers:
    - state: bike2
      map: ["enum.VehicleVisualLayers.AutoAnimate"]

- type: entity
  parent: BaseVehicle
  id: N14VehicleBuggyDune
  name: dune buggy
  description: A rugged offroad buggy.
  components:
  - type: Vehicle
    renderOver: North, NorthEast, East, SouthEast, South, SouthWest, West, NorthWest
  - type: Sprite
    sprite: _Nuclear14/Objects/Vehicles/bikesbuggy.rsi
    layers:
    - state: buggy_dune
      map: ["enum.VehicleVisualLayers.AutoAnimate"]
    - state: buggy_dune_cover
      map: ["enum.VehicleVisualLayers.Cover"]
    netsync: false
    noRot: true
  - type: MovementSpeedModifier
    acceleration: 1
    friction: 0.5
    baseWalkSpeed: 4.5
    baseSprintSpeed: 8
  - type: ItemSlots
    slots:
      key_slot:
        name: Keys
        whitelist:
          requireAll: true
          tags:
          - VehicleKey
        insertSound:
          path: /Audio/Effects/Vehicle/vehiclestartup.ogg
          params:
            volume: -3

- type: entity
  parent: N14VehicleBuggyDune
  id: N14VehicleBuggyOlive
  name: olive buggy
  description: A green offroad buggy.
  components:
  - type: Sprite
    layers:
    - state: buggy_olive
      map: ["enum.VehicleVisualLayers.AutoAnimate"]
    - state: buggy_olive_cover
      map: ["enum.VehicleVisualLayers.Cover"]

