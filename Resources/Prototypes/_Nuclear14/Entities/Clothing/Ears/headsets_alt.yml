- type: entity
  abstract: true
  parent: Clothing
  id: N14ClothingHeadsetAlt
  name: headset
  description: An earpiece with an intercom built into it, almost like a radio? Takes encryption keys.
  components:
  - type: Headset
    # #Misfits Add - all N14 headsets passively receive PBS (Broadcast) without a key; transmit requires EncryptionKeyPBS
    passiveChannels:
    - PBS
  - type: ContainerContainer
    containers:
      key_slots: !type:Container
  - type: ContainerFill
    containers:
      key_slots:
      - EncryptionKeyCommon
      - EncryptionKeyWastelandGlobal
  - type: EncryptionKeyHolder
    keySlots: 4
  - type: Sprite
    scale: 0.75, 0.75
    state: icon
  - type: Clothing
    # equippedPrefix: alt
    slots:
    - ears
  - type: Item
    size: Small

- type: entity
  parent: N14ClothingHeadsetAlt
  id: N14ClothingHeadsetVaulttec #No longer used, all Vault dwellers got the same headset now
  name: Vault-Tec over-ear headset
  components:
  - type: ContainerFill
    containers:
      key_slots:
      - EncryptionKeyStationMaster
      - EncryptionKeyWastelandGlobal
  - type: Sprite
    sprite: Clothing/Ears/Headsets/centcom.rsi
  - type: Clothing
    sprite: Clothing/Ears/Headsets/centcom.rsi

