- type: entity
  parent: ClothingHeadHardsuitWithLightBase
  id: N14ClothingHeadHelmetPowerArmorT45
  name: t-45 power armor helmet
  description: An old helmet used with T-45 Power Armor suits. It's amazing these still exist.
  components:
  - type: Sprite
    netsync: false
    sprite: _Nuclear14/Clothing/Head/PowerArmorHelmets/t45.rsi
    layers:
    - state: icon
    - state: icon-unshaded
    - state: light-overlay
      visible: false
      shader: unshaded
      map: [ "light" ]
  - type: HandheldLight
    addPrefix: false
  - type: ToggleableLightVisuals
    spriteLayer: light
    inhandVisuals:
      left:
      - state: on-inhand-left
      right:
      - state: on-inhand-right
    clothingVisuals:
      head:
      - state: on-equipped-HELMET
  - type: PointLight
    enabled: false
    radius: 6
    energy: 1
    mask: /Textures/Effects/LightMasks/cone.png
    autoRot: true
    netsync: false
  - type: Clothing
    equipSound: # Corvax-Change
      path: /Audio/_Nuclear14/Effects/PowerArmor/PowerArmor_Equip_Helmet_01.ogg
      params:
        volume: -12
    unequipSound: # Corvax-Change
      path: /Audio/_Nuclear14/Effects/PowerArmor/PowerArmor_Equip_Helmet_01.ogg
      params:
        volume: -12
    quickEquip: true
    clothingVisuals:
      head:
      - state: off-equipped-HELMET
      - state: equipped-HELMET-unshaded
  - type: EyeProtection
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.795
        Slash: 0.795
        Piercing: 0.845
        Heat: 0.845
        Radiation: 0.595
  - type: ExplosionResistance
    damageCoefficient: 0.845
