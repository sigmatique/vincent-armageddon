    - SimpleNeutral
  - type: Sprite
    sprite: _Nuclear14/Mobs/Pets/eyebot_wbos.rsi
    layers:
    - map: ["enum.DamageStateVisualLayers.Base"]
      state: icon
    - state: shadow_eyebot
