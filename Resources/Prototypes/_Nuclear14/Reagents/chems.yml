- type: reagent
  id: Buffout
  name: reagent-name-buffout
  group: Chems
  desc: reagent-desc-buffout
  physicalDesc: reagent-physical-desc-fortifying
  color: "#8b4513"
  metabolisms:
    Medicine:
      metabolismRate: 0.2 # Effectively once every 5 seconds.
      effects:
      - !type:AmbientDrugFlavorText
        cooldownId: BuffoutAmbient
        cooldown: 45
        messageKeys:
        - drug-ambience-buffout-1
        - drug-ambience-buffout-2
      - !type:Jitter
      - !type:Addicting #Misfits Change
        time: 6
        # Buffout withdrawal: muscles ache from sudden loss of chemical strength augmentation.
        withdrawalMoodEffect: BuffoutWithdrawal
        withdrawalDamage:
          groups:
            Brute: 0.2
        withdrawalStaminaDrain: 8.0
      - !type:HealthChange #Misfits Change /Add:/ Minor wound healing — Buffout's physical enhancement knits minor cuts.
        conditions:
        - !type:ReagentThreshold # Only heals when not at overdose threshold.
          max: 30
        damage:
          groups:
            Brute: -0.3
      - !type:HealthChange #Misfits Change /Add:/ Overdose — suffocates the player when stacking too much Buffout
        conditions:
        - !type:ReagentThreshold
          min: 30
        - !type:MobStateCondition #Misfits Tweak: OD can push to crit but never kill
        damage:
          types:
            Asphyxiation: 15
      - !type:OverdoseScaledDamage #Misfits Change /Add:/ Toxic damage scaling with excess Buffout in bloodstream
        conditions:
        - !type:MobStateCondition #Misfits Tweak: OD can push to crit but never kill
        threshold: 30
        damagePerUnit: 0.05
      - !type:SpecialStatBoostEffect #Misfits Change /Add:/ Temporary Strength boost — scales melee damage while drug is active.
        strengthBoost: 2
      # TODO: Implement HealthIncreaseReagent effect type to temporarily boost max HP
      # - !type:HealthIncreaseReagent
      #   increaseAmount: 50

