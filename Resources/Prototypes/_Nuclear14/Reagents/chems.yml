#MARK: Chems
- type: reagent
  id: MovespeedMixture #used in jet
  name: reagent-name-movespeedmod-mixture
  group: Chems
  desc: reagent-desc-healing-mixture
  physicalDesc: reagent-physical-desc-refreshing
  color: "#9e1d1d"
  metabolisms:
    Medicine:
      effects:
      - !type:AmbientDrugFlavorText
        cooldownId: MovespeedMixtureAmbient
        cooldown: 40
        messageKeys:
        - drug-ambience-movespeed-mixture-1
        - drug-ambience-movespeed-mixture-2
      # - !type:StrengthModifierReagent # Nuclear 14 Example of adding modifier to Chemicals
      #   strengthModifier: 1
      #   # statusLifetime: 5 # may be useful if we want to make it last longer after reagent is gone from blood?
      # - !type:PerceptionModifierReagent # Nuclear 14 Example of adding modifier to Chemicals
      #   perceptionModifier: 1
      # - !type:EnduranceModifierReagent # Nuclear 14 Example of adding modifier to Chemicals
      #   enduranceModifier: 1
      # - !type:CharismaModifierReagent # Nuclear 14 Example of adding modifier to Chemicals
      #   charismaModifier: 1
      # - !type:IntelligenceModifierReagent # Nuclear 14 Example of adding modifier to Chemicals
      #   intelligenceModifier: 1
      # - !type:AgilityModifierReagent # Nuclear 14 Example of adding modifier to Chemicals
      #   agilityModifier: 1
      # - !type:LuckModifierReagent # Nuclear 14 Example of adding modifier to Chemicals
      #   luckModifier: 1
      - !type:MovespeedModifier
        walkSpeedModifier: 1.1
        sprintSpeedModifier: 1.1
      - !type:GenericStatusEffect
        key: SeeingRainbows
        component: SeeingRainbows
        type: Add
        time: 5
        refresh: false
      - !type:HealthChange
        damage:
          types:
            Poison: 0.2
          groups:
      - !type:Jitter
      - !type:Addicting #Misfits Change
        time: 8
        # Jet withdrawal: lethargy and exhaustion without the speed rush.
        # Mood handled separately via JetBenefit moodletOnEnd → JetWithdrawal.
        withdrawalSpeedPenalty: 0.80
        withdrawalStaminaDrain: 5.0
      - !type:GenericStatusEffect
        key: Stun
        time: 3
        type: Remove
        conditions:
        - !type:ReagentThreshold
          min: 30
      - !type:GenericStatusEffect
        key: KnockedDown
        time: 3
        type: Remove
        conditions:
        - !type:ReagentThreshold
          min: 30
    Narcotic:
      effects:
      - !type:ChemAddMoodlet
        moodPrototype: JetBenefit

- type: reagent
  id: RobustMovespeedMixture #This is Turbo
  name: reagent-name-robust-movespeedmod-mixture
  group: Chems
  desc: reagent-name-robust-movespeedmod-mixture
  physicalDesc: reagent-physical-desc-roaring
  color: "#ffc8ff"
  boilingPoint: 255.0
  meltingPoint: 36.0
  metabolisms:
    Narcotic:
      effects:
      - !type:AmbientDrugFlavorText
        cooldownId: RobustMovespeedMixtureAmbient
        cooldown: 35
        messageKeys:
        - drug-ambience-robust-movespeed-mixture-1
        - drug-ambience-robust-movespeed-mixture-2
      - !type:MovespeedModifier
        walkSpeedModifier: 1.20
        sprintSpeedModifier: 1.20
      - !type:Drunk
      - !type:HealthChange
        damage:
          types:
            Poison: 0.5
          groups:
      - !type:Jitter
      - !type:Addicting #Misfits Change
        time: 10
        # RobustMovespeedMixture (Turbo) withdrawal: harder crash than regular Jet — severe fatigue and lethargy.
        withdrawalSpeedPenalty: 0.70
        withdrawalStaminaDrain: 7.0
      - !type:GenericStatusEffect
        key: Stun
        time: 5
        type: Remove
        conditions:
        - !type:ReagentThreshold
          min: 12
      - !type:GenericStatusEffect
        key: KnockedDown
        time: 5
        type: Remove
        conditions:
        - !type:ReagentThreshold
          min: 12
      - !type:HealthChange #Misfits Change /Add:/ Overdose — suffocates the player when stacking too much Turbo
        conditions:
        - !type:ReagentThreshold
          min: 15
        - !type:MobStateCondition #Misfits Tweak: OD can push to crit but never kill
        damage:
          types:
            Asphyxiation: 6
      - !type:OverdoseScaledDamage #Misfits Change /Add:/ Toxic damage scaling with excess Turbo in bloodstream
        conditions:
        - !type:MobStateCondition #Misfits Tweak: OD can push to crit but never kill
        threshold: 15
        damagePerUnit: 0.05


- type: reagent
  id: DamageModifyingMixture #used in psycho. TODO: figure out how to make a reagent give you a dmg buff
  name: reagent-name-damage-mod-mixture
  group: Chems
  desc: reagent-desc-damage-mod-mixture
  physicalDesc: reagent-physical-desc-enraging
  color: "#c6ba10"
  metabolisms:
    Medicine:
      metabolismRate: 0.2 # Effectively once every 5 seconds.
      effects:
      - !type:AmbientDrugFlavorText
        cooldownId: DamageModifyingMixtureAmbient
        cooldown: 45
        messageKeys:
        - drug-ambience-damage-modifying-mixture-1
        - drug-ambience-damage-modifying-mixture-2
      - !type:Drunk
      - !type:Addicting #Misfits Change
        time: 8
        # DamageModifyingMixture (Psycho) withdrawal: aggression crash, body aching from the comedown.
        # Mood handled separately via PsychoBenefit moodletOnEnd → PsychoWithdrawal.
        withdrawalDamage:
          groups:
            Brute: 0.2
        withdrawalStaminaDrain: 6.0
      - !type:MovespeedModifier
        walkSpeedModifier: 1.30
        sprintSpeedModifier: 1.30
      - !type:HealthChange #Misfits Change /Add:/ Overdose — suffocates the player when stacking too much Psycho
        conditions:
        - !type:ReagentThreshold
          min: 30
        - !type:MobStateCondition #Misfits Tweak: OD can push to crit but never kill
        damage:
          types:
            Asphyxiation: 20
      - !type:OverdoseScaledDamage #Misfits Change /Add:/ Toxic damage scaling with excess Psycho in bloodstream
        conditions:
        - !type:MobStateCondition #Misfits Tweak: OD can push to crit but never kill
        threshold: 30
        damagePerUnit: 0.05
    Narcotic:
      effects:
      - !type:ChemAddMoodlet
        moodPrototype: PsychoBenefit

