# #Misfits Add - Paladin-Slayer Centurion helmet: T-45d visor repurposed as centurion rank symbol.
- type: entity
  parent: N14ClothingHeadHatCenturionHelmet
  id: N14ClothingHeadHatPaladinSlayerCenturionHelmet
  name: paladin-slayer centurion helmet
  description: The once-marvelous helmet of a T-45d power armor set, repurposed by the Legion into a symbol of its might. A large plume of red horsehair crosses the top horizontally, denoting the rank of Centurion.
  components:
  - type: Sprite
    sprite: Corvax/Clothing/Head/Helmets/paladinslayercenthelmet.rsi  # #Misfits Add - RSI extracted from Big-Iron DMI
  - type: Clothing
    sprite: Corvax/Clothing/Head/Helmets/paladinslayercenthelmet.rsi
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.80
        Slash: 0.80
        Piercing: 0.80
        Heat: 0.80
  - type: ExplosionResistance
    damageCoefficient: 0.65

# #Misfits Add - Ranger-Hunter Centurion helmet: NCR ranger helmet refit for a Centurion.
- type: entity
  parent: N14ClothingHeadHatCenturionHelmet
  id: N14ClothingHeadHatRangerHunterCenturionHelmet
  name: ranger-hunter centurion helmet
  description: The helmet of an NCR ranger, refit to serve as a Centurion's helmet. The Ranger insignia has been defaced and replaced with the Legion bull.
  components:
  - type: Sprite
    sprite: Corvax/Clothing/Head/Helmets/rangerhuntercenthelmet.rsi  # #Misfits Add - RSI extracted from Big-Iron DMI
  - type: Clothing
    sprite: Corvax/Clothing/Head/Helmets/rangerhuntercenthelmet.rsi
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.80
        Slash: 0.80
        Piercing: 0.80
        Heat: 0.80
        Caustic: 0.80
  - type: ExplosionResistance
    damageCoefficient: 0.65
